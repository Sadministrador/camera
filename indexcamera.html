<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Telepresença AR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06060E;--s1:#0C0C1A;--s2:#10101E;--s3:#161628;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#5B5FEE;--accent2:#7B7FF0;--accent3:#A5A8FF;
  --green:#10B981;--red:#EF4444;--yellow:#F59E0B;
  --text:#F0F0FF;--muted:rgba(200,200,255,0.45);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}

/* ── CADASTRO ── */
#sCad{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:20;overflow-y:auto}
.cad-box{width:100%;max-width:360px;padding:40px 28px;text-align:center}
.cad-logo{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 28px}
.cad-box h1{font-size:28px;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px}
.cad-box p{font-size:14px;color:var(--muted);margin-bottom:36px;line-height:1.6}
.inp{width:100%;padding:14px 16px;background:var(--s2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;transition:border-color .2s}
.inp:focus{border-color:var(--accent2)}
.inp::placeholder{color:rgba(255,255,255,0.2)}
.btn-cad{width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-cad:hover:not(:disabled){background:var(--accent2)}
.btn-cad:active{transform:scale(.98)}
.btn-cad:disabled{opacity:.4;cursor:not-allowed}

/* ── AGUARDA ── */
#sAgu{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:var(--bg);z-index:20;flex-direction:column;text-align:center;padding:40px}
.agu-pulse{width:88px;height:88px;border-radius:50%;background:rgba(91,95,238,0.1);border:1px solid rgba(91,95,238,0.3);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 28px;animation:agupulse 2s ease-in-out infinite}
@keyframes agupulse{0%,100%{box-shadow:0 0 0 0 rgba(91,95,238,0.4)}50%{box-shadow:0 0 0 28px rgba(91,95,238,0)}}
.agu-title{font-size:22px;font-weight:600;margin-bottom:10px}
.agu-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px}
.btn-cancel{padding:10px 24px;background:transparent;border:1px solid var(--border2);border-radius:10px;color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:var(--red);color:var(--red)}

/* ── PRINCIPAL ── */
#sMain{position:absolute;inset:0;display:none;flex-direction:column;background:#000}

/* ── TOP BAR ── */
.top-bar{background:rgba(6,6,14,0.95);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;backdrop-filter:blur(12px);z-index:10}
.top-left{display:flex;align-items:center;gap:10px}
.top-av{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.top-name{font-size:14px;font-weight:500}
.top-code{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.top-right{display:flex;align-items:center;gap:10px}
.dot-on{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 8px rgba(16,185,129,0.8)}
.btn-sair{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:12px;padding:6px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-sair:hover{border-color:var(--red);color:var(--red)}

/* ── GRADE DE VÍDEO ── */
#videoGrid{flex:1;display:grid;background:#000;overflow:hidden;gap:2px;position:relative}
#videoGrid.g1{grid-template-columns:1fr;grid-template-rows:1fr}
#videoGrid.g2{grid-template-columns:1fr 1fr;grid-template-rows:1fr}
#videoGrid.g3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
#videoGrid.g3 .v-tile:first-child{grid-column:1 / -1}
#videoGrid.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
#videoGrid.g5{grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr}
#videoGrid.g5 .v-tile:first-child{grid-column:1 / span 2}
#videoGrid.g6{grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr}
#videoGrid.g7{grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr}
#videoGrid.g7 .v-tile:first-child{grid-column:1 / span 2}
#videoGrid.g8{grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr}

.v-tile{position:relative;background:#0A0A16;overflow:hidden}
.v-tile video{width:100%;height:100%;object-fit:cover;display:block}
.v-tile.self video{transform:scaleX(-1)}
.v-tile-label{position:absolute;bottom:8px;left:8px;font-size:11px;font-weight:500;background:rgba(0,0,0,0.7);padding:4px 10px;border-radius:20px;color:#fff;white-space:nowrap;max-width:calc(100% - 16px);overflow:hidden;text-overflow:ellipsis;backdrop-filter:blur(8px)}
.v-tile-av{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#0A0A16}
.av-circle{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;letter-spacing:0.5px}
.av-nm{font-size:12px;color:var(--muted)}

/* ── INCOMING CALL ── */
#incomingCall{position:absolute;inset:0;background:rgba(4,4,12,0.97);z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:24px}
.ic-avatar{width:100px;height:100px;border-radius:28px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:600;animation:icring 0.7s ease-in-out infinite alternate;position:relative}
.ic-avatar::after{content:'';position:absolute;inset:-6px;border-radius:34px;border:2px solid var(--green);animation:icring2 0.7s ease-in-out infinite alternate}
@keyframes icring{0%{transform:scale(1)}100%{transform:scale(1.05)}}
@keyframes icring2{0%{opacity:1;inset:-6px}100%{opacity:0.3;inset:-14px}}
.ic-name{font-size:24px;font-weight:600;letter-spacing:-0.3px}
.ic-sub{font-size:14px;color:var(--muted)}
.ic-btns{display:flex;gap:28px;margin-top:8px}
.ic-btn{width:68px;height:68px;border-radius:50%;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,filter .15s}
.ic-btn:active{transform:scale(.88)}
.ic-btn.answer{background:var(--green)}
.ic-btn.reject{background:var(--red)}

/* ── NOTIF NÚMERO ── */
#numNotify{position:absolute;top:68px;left:50%;transform:translateX(-50%);background:rgba(12,12,26,0.98);border:1px solid rgba(91,95,238,0.4);border-radius:18px;padding:20px 24px;z-index:30;text-align:center;display:none;min-width:260px;box-shadow:0 12px 48px rgba(0,0,0,0.7);backdrop-filter:blur(16px)}
.nn-title{font-size:12px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.8px}
.nn-code{font-size:44px;font-weight:500;font-family:'DM Mono',monospace;color:var(--accent3);letter-spacing:4px;margin-bottom:16px}
.nn-btns{display:flex;gap:10px;justify-content:center}
.nn-btn{padding:10px 22px;border-radius:10px;border:none;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s}
.nn-btn.accept{background:var(--green);color:#fff}.nn-btn.accept:hover{filter:brightness(1.1)}
.nn-btn.dismiss{background:rgba(255,255,255,0.07);color:var(--muted);border:1px solid var(--border2)}.nn-btn.dismiss:hover{background:rgba(255,255,255,0.1)}

/* ── BOTTOM BAR ── */
.bottom-bar{background:rgba(6,6,14,0.97);border-top:1px solid var(--border);padding:14px 16px;flex-shrink:0;backdrop-filter:blur(12px);z-index:10}

/* DIAL */
#dialBox{}
.dial-label{font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.8px}
.dial-row{display:flex;gap:10px;align-items:center}
.dial-inp{flex:1;padding:13px 16px;background:var(--s2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:28px;font-family:'DM Mono',monospace;font-weight:500;outline:none;text-align:center;letter-spacing:6px;transition:border-color .2s}
.dial-inp:focus{border-color:var(--accent2)}
.dial-inp::placeholder{font-size:14px;letter-spacing:0;color:rgba(255,255,255,0.15);font-family:'DM Sans',sans-serif;font-weight:400}
.btn-dial{padding:13px 22px;background:var(--green);border:none;border-radius:12px;color:#fff;font-size:22px;cursor:pointer;flex-shrink:0;transition:all .2s}
.btn-dial:hover{filter:brightness(1.1)}
.btn-dial:active{transform:scale(.95)}

/* CALL BAR */
#callBar{display:none;flex-direction:column;gap:12px}
.call-info{display:flex;align-items:center;justify-content:space-between}
.call-who{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;max-width:70%;overflow:hidden}
.call-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.call-timer{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)}
.call-btns{display:flex;gap:14px;justify-content:center}
.cbtn{width:54px;height:54px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .2s}
.cbtn:active{transform:scale(.88)}
.cbtn.mic{background:rgba(255,255,255,0.1)}
.cbtn.cam{background:rgba(255,255,255,0.1)}
.cbtn.end{background:var(--red)}
.cbtn.off{background:rgba(255,255,255,0.04);opacity:.4}
.cbtn:hover{filter:brightness(1.15)}

/* ── TOAST ── */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(12,12,26,0.98);border:1px solid var(--border2);border-radius:14px;padding:11px 22px;font-size:13px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;backdrop-filter:blur(16px);max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- CADASTRO -->
<div id="sCad">
  <div class="cad-box">
    <div class="cad-logo">📡</div>
    <h1>Telepresença</h1>
    <p>Entre com seus dados para<br>solicitar acesso à sala</p>
    <input class="inp" id="iNome" type="text" placeholder="Seu nome completo" autocomplete="off"/>
    <input class="inp" id="iTel" type="tel" placeholder="Seu telefone" autocomplete="off"/>
    <button class="btn-cad" id="btnCad" onclick="cadastrar()">Solicitar acesso</button>
  </div>
</div>

<!-- AGUARDANDO -->
<div id="sAgu">
  <div class="agu-pulse">⏳</div>
  <div class="agu-title">Aguardando aprovação</div>
  <div class="agu-sub">Seu cadastro foi enviado ao monitor.<br>Em breve você será liberado para entrar.</div>
  <button class="btn-cancel" onclick="cancelarCad()">Cancelar</button>
</div>

<!-- PRINCIPAL -->
<div id="sMain">

  <!-- TOP -->
  <div class="top-bar">
    <div class="top-left">
      <div class="top-av" id="topAv">?</div>
      <div>
        <div class="top-name" id="topNome">—</div>
        <div class="top-code" id="topCod">#—</div>
      </div>
    </div>
    <div class="top-right">
      <div class="dot-on"></div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <!-- GRADE -->
  <div id="videoGrid" class="g1"></div>

  <!-- INCOMING CALL -->
  <div id="incomingCall">
    <div class="ic-avatar" id="icAv">?</div>
    <div class="ic-name" id="icName">—</div>
    <div class="ic-sub">Ligação recebida</div>
    <div class="ic-btns">
      <button class="ic-btn answer" onclick="aceitarChamada()">✅</button>
      <button class="ic-btn reject" onclick="rejeitarChamada()">❌</button>
    </div>
  </div>

  <!-- NÚMERO DO MONITOR -->
  <div id="numNotify">
    <div class="nn-title">Monitor enviou um número</div>
    <div class="nn-code" id="nnCode">—</div>
    <div class="nn-btns">
      <button class="nn-btn accept" onclick="aceitarNumero()">📞 Ligar</button>
      <button class="nn-btn dismiss" onclick="dispensarNumero()">Ignorar</button>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-bar">
    <div id="dialBox">
      <div class="dial-label">Digite o código para ligar (1 – 100)</div>
      <div class="dial-row">
        <input class="dial-inp" id="dialInp" type="number" min="1" max="100" placeholder="Código..."
               onkeydown="if(event.key==='Enter')discar()"/>
        <button class="btn-dial" onclick="discar()">📞</button>
      </div>
    </div>
    <div id="callBar">
      <div class="call-info">
        <div class="call-who"><div class="call-dot"></div><span id="callComQuem" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span></div>
        <div class="call-timer" id="callTimer">00:00</div>
      </div>
      <div class="call-btns">
        <button class="cbtn mic" id="btnMic" onclick="toggleMic()" title="Microfone">🎤</button>
        <button class="cbtn end" onclick="encerrarTodos()" title="Encerrar">📵</button>
        <button class="cbtn cam" id="btnCam" onclick="toggleCam()" title="Câmera">📷</button>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, remove, update, off }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ════════════════════════════════════════
   CONFIGURAÇÃO FIREBASE — altere aqui
   ════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "COLE_SUA_APIKEY_AQUI",
  authDomain:        "dieta-monitorada-b9500.firebaseapp.com",
  databaseURL:       "https://dieta-monitorada-b9500-default-rtdb.firebaseio.com",
  projectId:         "dieta-monitorada-b9500",
  storageBucket:     "dieta-monitorada-b9500.appspot.com",
  messagingSenderId: "COLE_SEU_SENDERID_AQUI",
  appId:             "COLE_SEU_APPID_AQUI"
};
/* ════════════════════════════════════════ */

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const ICE = { iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun2.l.google.com:19302'}
]};

let myUid = null, myData = null, localStream = null;
let micOn = true, camOn = true;
let peers = {};         // { uid → { pc, data:{name,code}, stream } }
let pendingCall = null; // { fromUid, fromData }
let pendingDialCode = null;
let callInterval = null, callSec = 0;
let unsubApproval=null, unsubSignal=null, unsubDialCmd=null, unsubMonMsg=null;
const processedOffers = new Set();

// ── AudioContext para ringtone ──────────────────────────────
let audioCtx = null, ringtoneNodes = [], ringtoneInterval = null;

function unlockAudio(){
  if(audioCtx) return;
  try{ audioCtx = new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
}

function startRingtone(){
  unlockAudio(); if(!audioCtx) return;
  stopRingtone();
  function ring(){
    if(!audioCtx) return;
    try{
      // Sequência musical: três notas curtas
      const freqs=[880,1109,1318];
      freqs.forEach((f,i)=>{
        const osc=audioCtx.createOscillator();
        const gain=audioCtx.createGain();
        const t=audioCtx.currentTime + i*0.12;
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type='sine';
        osc.frequency.setValueAtTime(f, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.45, t+0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t+0.11);
        osc.start(t); osc.stop(t+0.12);
        ringtoneNodes.push(osc);
      });
    }catch(e){}
  }
  ring();
  ringtoneInterval = setInterval(ring, 1000);
}

function stopRingtone(){
  if(ringtoneInterval){clearInterval(ringtoneInterval);ringtoneInterval=null;}
  ringtoneNodes.forEach(n=>{try{n.stop();}catch(e){}});
  ringtoneNodes=[];
}

// Som de conexão estabelecida
function playConnectSound(){
  unlockAudio(); if(!audioCtx) return;
  try{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime+0.1);
    osc.frequency.setValueAtTime(784, audioCtx.currentTime+0.2);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.5);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime+0.5);
  }catch(e){}
}

// Som de desconexão
function playDisconnectSound(){
  unlockAudio(); if(!audioCtx) return;
  try{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.setValueAtTime(330, audioCtx.currentTime+0.15);
    osc.frequency.setValueAtTime(220, audioCtx.currentTime+0.3);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.55);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime+0.55);
  }catch(e){}
}

// ── Utilitários ─────────────────────────────────────────────
const ini = n=>(n||'?').trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const $   = id=>document.getElementById(id);

function show(id){
  ['sCad','sAgu','sMain'].forEach(s=>{$(s).style.display='none';});
  $(id).style.display='flex';
}
function toast(msg,dur=3500){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function saveLocal(){localStorage.setItem('tp_v6',JSON.stringify({uid:myUid,data:myData}));}
function clearLocal(){localStorage.removeItem('tp_v6');myUid=null;myData=null;}

// ── INIT ────────────────────────────────────────────────────
async function init(){
  const saved=localStorage.getItem('tp_v6');
  if(saved){
    try{
      const {uid,data}=JSON.parse(saved);
      myUid=uid; myData=data;
      const snap=await get(ref(db,'users/'+myUid));
      if(!snap.exists()){clearLocal();show('sCad');return;}
      myData=snap.val(); saveLocal();
      if(myData.blocked){toast('Acesso bloqueado');clearLocal();show('sCad');return;}
      if(!myData.approved){esperarAprovacao();return;}
      entrarMain();
    }catch(e){clearLocal();show('sCad');}
  } else {show('sCad');}
}

// ── CADASTRO ────────────────────────────────────────────────
window.cadastrar = async function(){
  unlockAudio();
  const nome=$('iNome').value.trim();
  const tel=$('iTel').value.trim();
  if(!nome||!tel){toast('Preencha nome e telefone');return;}
  const btn=$('btnCad');
  btn.disabled=true; btn.textContent='Enviando...';
  try{
    const allSnap=await get(ref(db,'users'));
    let usedCodes=[];
    if(allSnap.exists()){
      const all=allSnap.val();
      const ex=Object.entries(all).find(([k,v])=>v.phone===tel);
      if(ex){
        const [uid,u]=ex; myUid=uid; myData=u; saveLocal();
        if(u.blocked){toast('Acesso bloqueado');clearLocal();return;}
        if(!u.approved){esperarAprovacao();return;}
        entrarMain(); return;
      }
      usedCodes=Object.values(all).map(u=>u.code).filter(Boolean);
    }
    let code=null;
    for(let i=1;i<=100;i++){if(!usedCodes.includes(i)){code=i;break;}}
    if(!code){toast('Limite de 100 usuários atingido');return;}
    const newRef=push(ref(db,'users'));
    myUid=newRef.key;
    myData={name:nome,phone:tel,code,approved:false,blocked:false,online:false,createdAt:Date.now()};
    await set(newRef,myData);
    saveLocal();
    esperarAprovacao();
  }catch(err){toast('Erro ao cadastrar. Tente novamente.');console.error(err);}
  finally{btn.disabled=false;btn.textContent='Solicitar acesso';}
};

function esperarAprovacao(){
  show('sAgu');
  if(unsubApproval){unsubApproval();unsubApproval=null;}
  unsubApproval=onValue(ref(db,'users/'+myUid),snap=>{
    if(!snap.exists()){clearLocal();show('sCad');return;}
    const u=snap.val(); myData=u; saveLocal();
    if(u.blocked){toast('Acesso bloqueado');clearLocal();show('sCad');return;}
    if(u.approved){if(unsubApproval){unsubApproval();unsubApproval=null;}entrarMain();}
  });
}

window.cancelarCad = async function(){
  if(myUid) await remove(ref(db,'users/'+myUid));
  clearLocal(); $('iNome').value=''; $('iTel').value=''; show('sCad');
};

// ── ENTRAR MAIN ──────────────────────────────────────────────
async function entrarMain(){
  await update(ref(db,'users/'+myUid),{online:true});
  $('topAv').textContent=ini(myData.name);
  $('topNome').textContent=myData.name;
  $('topCod').textContent='Código: '+myData.code;
  show('sMain');
  await abrirCamera();
  renderGrid();
  ouvirSinalizacao();
  ouvirDialCmd();
  ouvirMonMsg();
}

window.sair = async function(){
  stopRingtone();
  encerrarTodosOsPeers();
  encerrarStream();
  if(unsubSignal){unsubSignal();unsubSignal=null;}
  if(unsubDialCmd){unsubDialCmd();unsubDialCmd=null;}
  if(unsubMonMsg){unsubMonMsg();unsubMonMsg=null;}
  await update(ref(db,'users/'+myUid),{online:false});
  clearLocal(); $('iNome').value=''; $('iTel').value=''; show('sCad');
};

// ── CÂMERA ───────────────────────────────────────────────────
async function abrirCamera(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},
      audio:{echoCancellation:true,noiseSuppression:true,sampleRate:48000}
    });
  }catch(e){
    try{localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});}
    catch(e2){
      try{localStream=await navigator.mediaDevices.getUserMedia({audio:true});}
      catch(e3){toast('Câmera/mic indisponível');}
    }
  }
}
function encerrarStream(){if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}}

// ── GRID ─────────────────────────────────────────────────────
function renderGrid(){
  const grid=$('videoGrid');
  const pl=Object.entries(peers);
  const total=1+pl.length;
  const classes=['g1','g2','g3','g4','g5','g6','g7','g8'];
  grid.className=classes[Math.min(total,8)-1];
  grid.innerHTML='';
  grid.appendChild(makeTile('self',myData,localStream,true));
  pl.forEach(([uid,peer])=>grid.appendChild(makeTile(uid,peer.data,peer.stream,false)));

  if(pl.length>0){
    const nomes=pl.map(([,p])=>p.data.name+' '+p.data.code).join(', ');
    $('callComQuem').textContent=nomes;
    $('dialBox').style.display='none';
    $('callBar').style.display='flex';
    if(!callInterval) startTimer();
  } else {
    $('dialBox').style.display='block';
    $('callBar').style.display='none';
    stopTimer();
  }
}

function makeTile(uid,data,stream,isSelf){
  const tile=document.createElement('div');
  tile.className='v-tile'+(isSelf?' self':'');
  tile.id='tile-'+uid;

  const hasVideo=stream && stream.getVideoTracks().length>0 && stream.getVideoTracks()[0].enabled;
  if(hasVideo){
    const v=document.createElement('video');
    v.autoplay=true; v.playsInline=true;
    v.muted=isSelf; v.srcObject=stream;
    v.volume=isSelf?0:1;
    tile.appendChild(v);
  } else {
    const av=document.createElement('div');
    av.className='v-tile-av';
    const circ=document.createElement('div');
    circ.className='av-circle';
    circ.textContent=data?ini(data.name):'?';
    const nm=document.createElement('div');
    nm.className='av-nm';
    nm.textContent=data?(isSelf?'Você':data.name):'...';
    av.appendChild(circ); av.appendChild(nm);
    tile.appendChild(av);
    if(stream && !isSelf){
      const a=document.createElement('audio');
      a.autoplay=true; a.srcObject=stream; a.volume=1;
      tile.appendChild(a);
    }
  }

  const lbl=document.createElement('div');
  lbl.className='v-tile-label';
  lbl.textContent=data?(isSelf?'Você':data.name+' '+data.code):'...';
  tile.appendChild(lbl);
  return tile;
}

// ── TIMER ────────────────────────────────────────────────────
function startTimer(){
  callSec=0;
  callInterval=setInterval(()=>{
    callSec++;
    const m=String(Math.floor(callSec/60)).padStart(2,'0');
    const s=String(callSec%60).padStart(2,'0');
    $('callTimer').textContent=m+':'+s;
  },1000);
}
function stopTimer(){clearInterval(callInterval);callInterval=null;$('callTimer').textContent='00:00';}

// ── DISCAR ───────────────────────────────────────────────────
window.discar = async function(){
  unlockAudio();
  const n=parseInt($('dialInp').value);
  if(!n||n<1||n>100){toast('Digite um código de 1 a 100');return;}
  if(n===myData.code){toast('Não pode ligar para si mesmo');return;}
  if(Object.keys(peers).length>=7){toast('Máximo de 8 participantes');return;}
  const allSnap=await get(ref(db,'users'));
  if(!allSnap.exists()){toast('Nenhum usuário encontrado');return;}
  const entry=Object.entries(allSnap.val()).find(([k,v])=>v.code===n&&v.approved&&!v.blocked);
  if(!entry){toast('Código #'+n+' não encontrado ou offline');return;}
  const [tUid,tData]=entry;
  if(peers[tUid]){toast('Já conectado com '+n);return;}
  $('dialInp').value='';
  toast('📞 Chamando '+tData.name+' '+n+'...');
  await iniciarWebRTC(tUid,tData,true);
};

// ── DIAL CMD DO MONITOR ──────────────────────────────────────
function ouvirDialCmd(){
  if(unsubDialCmd){unsubDialCmd();unsubDialCmd=null;}
  unsubDialCmd=onValue(ref(db,'dial_command/'+myUid),async snap=>{
    if(!snap.exists()) return;
    const cmd=snap.val();
    if(!cmd||!cmd.code) return;
    await remove(ref(db,'dial_command/'+myUid));
    pendingDialCode=cmd.code;
    $('nnCode').textContent=cmd.code;
    $('numNotify').style.display='block';
    startRingtone(); // toca o ringtone ao receber número
  });
}
window.aceitarNumero = async function(){
  stopRingtone();
  $('numNotify').style.display='none';
  if(pendingDialCode){
    $('dialInp').value=pendingDialCode;
    pendingDialCode=null;
    await window.discar();
  }
};
window.dispensarNumero = function(){
  stopRingtone();
  $('numNotify').style.display='none';
  pendingDialCode=null;
};

// ── MSG DO MONITOR ───────────────────────────────────────────
function ouvirMonMsg(){
  if(unsubMonMsg){unsubMonMsg();unsubMonMsg=null;}
  unsubMonMsg=onValue(ref(db,'monitor_msg/'+myUid),snap=>{
    if(!snap.exists()) return;
    const m=snap.val();
    if(m&&m.text) toast('📩 Monitor: '+m.text,5000);
  });
}

// ══════════════════════════════════════════════════════════════
// WebRTC — Reunião multi-peer
// ══════════════════════════════════════════════════════════════

async function iniciarWebRTC(tUid,tData,isCaller){
  if(peers[tUid]) return;

  const pc=new RTCPeerConnection(ICE);
  peers[tUid]={pc,data:tData,stream:null};

  if(localStream){
    localStream.getTracks().forEach(track=>pc.addTrack(track,localStream));
  }

  pc.ontrack = evt=>{
    if(!peers[tUid]) return;
    const remoteStream=evt.streams[0]||new MediaStream([evt.track]);
    peers[tUid].stream=remoteStream;
    renderGrid();
  };

  pc.onicecandidate = evt=>{
    if(evt.candidate){
      push(ref(db,'signal/'+tUid+'/ice_'+myUid),{c:JSON.stringify(evt.candidate)});
    }
  };

  pc.onconnectionstatechange = ()=>{
    const s=pc.connectionState;
    if(s==='connected'){playConnectSound();toast('✅ Conectado com '+tData.name);}
    if(s==='disconnected'||s==='failed'||s==='closed'){
      playDisconnectSound();
      toast('📵 '+tData.name+' desconectou');
      encerrarPeer(tUid);
    }
  };

  await remove(ref(db,'signal/'+myUid+'/ice_'+tUid));

  if(isCaller){
    const offer=await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:true});
    await pc.setLocalDescription(offer);
    await set(ref(db,'signal/'+tUid+'/offer_'+myUid),{
      sdp:JSON.stringify(pc.localDescription),
      name:myData.name,code:myData.code
    });
    const ansRef=ref(db,'signal/'+myUid+'/answer_'+tUid);
    const unsubAns=onValue(ansRef,async snap=>{
      if(!snap.exists()) return;
      if(pc.signalingState!=='have-local-offer') return;
      try{
        await pc.setRemoteDescription(JSON.parse(snap.val().sdp));
        unsubAns();
      }catch(e){console.error('setRemoteDescription answer:',e);}
    });
  } else {
    const offerSnap=await get(ref(db,'signal/'+myUid+'/offer_'+tUid));
    if(!offerSnap.exists()){delete peers[tUid];return;}
    const {sdp}=offerSnap.val();
    await pc.setRemoteDescription(JSON.parse(sdp));
    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await set(ref(db,'signal/'+tUid+'/answer_'+myUid),{sdp:JSON.stringify(pc.localDescription)});
  }

  // Ouvir ICE candidates do outro lado
  onValue(ref(db,'signal/'+myUid+'/ice_'+tUid),snap=>{
    if(!snap.exists()||!peers[tUid]) return;
    Object.values(snap.val()).forEach(item=>{
      if(!item.c) return;
      pc.addIceCandidate(new RTCIceCandidate(JSON.parse(item.c))).catch(()=>{});
    });
  });

  renderGrid();
}

// ── OUVIR CHAMADAS ENTRANTES ─────────────────────────────────
function ouvirSinalizacao(){
  if(unsubSignal){unsubSignal();unsubSignal=null;}

  unsubSignal=onValue(ref(db,'signal/'+myUid),async snap=>{
    if(!snap.exists()) return;
    const data=snap.val();
    for(const key of Object.keys(data)){
      if(!key.startsWith('offer_')) continue;
      if(processedOffers.has(key)) continue;
      const fromUid=key.replace('offer_','');
      if(peers[fromUid]) continue;
      if(Object.keys(peers).length>=7){toast('Chamada recusada: sala cheia');continue;}
      processedOffers.add(key);
      const {name,code}=data[key];
      pendingCall={fromUid,fromData:{name,code}};
      $('icAv').textContent=ini(name);
      $('icName').textContent=name+' '+code;
      $('incomingCall').style.display='flex';
      startRingtone();
    }
  });
}

window.aceitarChamada = async function(){
  unlockAudio(); stopRingtone();
  $('incomingCall').style.display='none';
  if(!pendingCall) return;
  const {fromUid,fromData}=pendingCall;
  pendingCall=null;
  await iniciarWebRTC(fromUid,fromData,false);
};

window.rejeitarChamada = async function(){
  stopRingtone();
  $('incomingCall').style.display='none';
  if(!pendingCall) return;
  const {fromUid}=pendingCall;
  pendingCall=null;
  await remove(ref(db,'signal/'+myUid+'/offer_'+fromUid));
  toast('Chamada rejeitada');
};

// ── ENCERRAR PEER ────────────────────────────────────────────
async function encerrarPeer(tUid){
  if(!peers[tUid]) return;
  try{peers[tUid].pc.close();}catch(e){}
  delete peers[tUid];
  await Promise.all([
    remove(ref(db,'signal/'+tUid+'/offer_'+myUid)),
    remove(ref(db,'signal/'+tUid+'/answer_'+myUid)),
    remove(ref(db,'signal/'+myUid+'/offer_'+tUid)),
    remove(ref(db,'signal/'+myUid+'/answer_'+tUid)),
    remove(ref(db,'signal/'+myUid+'/ice_'+tUid)),
    remove(ref(db,'signal/'+tUid+'/ice_'+myUid))
  ]).catch(()=>{});
  renderGrid();
}
function encerrarTodosOsPeers(){Object.keys(peers).forEach(uid=>encerrarPeer(uid));}
window.encerrarTodos = encerrarTodosOsPeers;

// ── MIC / CAM ─────────────────────────────────────────────────
window.toggleMic = function(){
  micOn=!micOn;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=micOn);
  $('btnMic').classList.toggle('off',!micOn);
  $('btnMic').title=micOn?'Silenciar':'Ativar microfone';
};
window.toggleCam = function(){
  camOn=!camOn;
  if(localStream) localStream.getVideoTracks().forEach(t=>t.enabled=camOn);
  $('btnCam').classList.toggle('off',!camOn);
  $('btnCam').title=camOn?'Desligar câmera':'Ligar câmera';
  renderGrid();
};

window.addEventListener('beforeunload',()=>{
  if(myUid) update(ref(db,'users/'+myUid),{online:false});
});

init();
</script>
