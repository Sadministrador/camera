<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Telepresença AR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Syne',sans-serif;color:#fff}

/* ── TELA CADASTRO ── */
#sCad{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#07070f;z-index:10;overflow-y:auto}
.cad-box{width:100%;max-width:340px;padding:24px;text-align:center}
.cad-icon{font-size:52px;margin-bottom:16px}
.cad-box h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,#a89bff,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.cad-box p{font-size:13px;color:rgba(200,200,255,0.45);margin-bottom:28px}
.inp{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(120,120,255,0.18);border-radius:12px;color:#fff;font-size:15px;font-family:'Syne',sans-serif;outline:none;margin-bottom:12px;transition:border-color .2s}
.inp:focus{border-color:rgba(120,120,255,0.5)}
.inp::placeholder{color:rgba(255,255,255,0.2)}

/* ── FOTO UPLOAD ── */
.foto-area{width:100%;margin-bottom:12px}
#fotoInput{display:none}
.btn-foto{width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:2px dashed rgba(120,120,255,0.3);border-radius:12px;color:rgba(200,200,255,0.6);font-size:14px;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-foto:hover{border-color:rgba(120,120,255,0.6);background:rgba(120,120,255,0.06);color:#fff}
.btn-foto.has-foto{border-style:solid;border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.08);color:#a89bff}
.foto-preview-wrap{position:relative;display:inline-block;margin-bottom:8px}
.foto-preview{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid rgba(99,102,241,0.6);display:none}
.foto-del{position:absolute;top:-4px;right:-4px;width:22px;height:22px;border-radius:50%;background:#ef4444;border:none;color:#fff;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}

.btn-cad{width:100%;padding:14px;background:#6366f1;border:none;border-radius:12px;color:#fff;font-size:15px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-cad:active{background:#4f52d9}
.btn-cad:disabled{opacity:.5;cursor:not-allowed}

/* upload progress */
.upload-progress{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-bottom:12px;overflow:hidden;display:none}
.upload-bar{height:100%;background:linear-gradient(90deg,#6366f1,#a89bff);border-radius:4px;width:0%;transition:width .3s}

/* ── TELA AGUARDA ── */
#sAgu{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#07070f;z-index:10;flex-direction:column;text-align:center;padding:24px}
.agu-ring{width:88px;height:88px;border-radius:50%;border:2px solid rgba(99,102,241,0.5);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.5)}50%{box-shadow:0 0 0 20px rgba(99,102,241,0)}}
.agu-title{font-size:20px;font-weight:700;margin-bottom:8px}
.agu-sub{font-size:13px;color:rgba(200,200,255,0.45);line-height:1.7;margin-bottom:20px}
.btn-cancel{padding:10px 22px;background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:rgba(255,255,255,0.45);font-size:13px;font-family:'Syne',sans-serif;cursor:pointer}

/* ── TELA PRINCIPAL ── */
#sMain{position:absolute;inset:0;display:none}
#vSelf{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;transform:scaleX(-1)}
#vRemote{position:absolute;bottom:100px;right:14px;width:110px;height:150px;object-fit:cover;border-radius:12px;border:2px solid rgba(255,255,255,0.2);background:#111;z-index:5;transform:scaleX(-1);display:none}
.remote-av{position:absolute;bottom:100px;right:14px;width:110px;height:150px;border-radius:12px;border:2px solid rgba(99,102,241,0.4);background:#12122a;z-index:5;display:none;align-items:center;justify-content:center;flex-direction:column;gap:6px}
.remote-av .av-ini{width:44px;height:44px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.remote-av img.av-foto{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(99,102,241,0.5)}
.remote-av .av-nm{font-size:10px;color:rgba(255,255,255,0.6);text-align:center;padding:0 6px}

.top-bar{position:absolute;top:0;left:0;right:0;z-index:10;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.7) 0%,transparent 100%)}
.top-user{display:flex;align-items:center;gap:9px}
.top-av{width:34px;height:34px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden}
.top-av img{width:100%;height:100%;object-fit:cover}
.top-name{font-size:13px;font-weight:600}
.top-code{font-size:11px;color:rgba(255,255,255,0.5);font-family:'Space Mono',monospace}
.dot-online{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}

.dial-box{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(7,7,15,0.85);border:1px solid rgba(120,120,255,0.25);border-radius:16px;padding:12px 14px;backdrop-filter:blur(16px);width:calc(100% - 32px);max-width:320px}
.dial-label{font-size:11px;color:rgba(200,200,255,0.45);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.dial-row{display:flex;gap:8px;align-items:center}
.dial-inp{flex:1;padding:11px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(120,120,255,0.2);border-radius:10px;color:#fff;font-size:22px;font-family:'Space Mono',monospace;font-weight:700;outline:none;text-align:center;letter-spacing:4px}
.dial-inp::placeholder{font-size:14px;letter-spacing:0;color:rgba(255,255,255,0.2);font-family:'Syne',sans-serif;font-weight:400}
.btn-dial{padding:11px 18px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-size:13px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-dial:active{background:#4f52d9}

.call-bar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(7,7,15,0.85);border:1px solid rgba(120,120,255,0.25);border-radius:16px;padding:10px 14px;backdrop-filter:blur(16px);width:calc(100% - 32px);max-width:320px;display:none;flex-direction:column;gap:8px}
.call-info-row{display:flex;align-items:center;justify-content:space-between}
.call-with{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.call-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.call-timer{font-family:'Space Mono',monospace;font-size:12px;color:rgba(255,255,255,0.5)}
.call-btns{display:flex;gap:8px;align-items:center}
.call-msg-inp{flex:1;padding:9px 12px;background:rgba(255,255,255,0.07);border:1px solid rgba(120,120,255,0.2);border-radius:9px;color:#fff;font-size:13px;font-family:'Syne',sans-serif;outline:none}
.call-msg-inp::placeholder{color:rgba(255,255,255,0.25)}
.cbtn{width:38px;height:38px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0}
.cbtn.mic{background:rgba(255,255,255,0.12)}
.cbtn.cam{background:rgba(255,255,255,0.12)}
.cbtn.end{background:#ef4444}
.cbtn.off{opacity:.35}

.msgs-overlay{position:absolute;bottom:140px;left:14px;right:14px;z-index:8;display:flex;flex-direction:column;gap:6px;max-height:160px;overflow:hidden;justify-content:flex-end}
.fmsg{padding:7px 12px;border-radius:9px;font-size:13px;line-height:1.4;max-width:80%;word-break:break-word;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fmsg.me{align-self:flex-end;background:rgba(99,102,241,0.75)}
.fmsg.them{align-self:flex-start;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1)}
.fmsg .who{font-size:10px;opacity:.6;margin-bottom:2px}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(13,13,31,0.95);border:1px solid rgba(120,120,255,0.3);border-radius:12px;padding:10px 20px;font-size:13px;z-index:999;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- CADASTRO -->
<div id="sCad">
  <div class="cad-box">
    <div class="cad-icon">📡</div>
    <h1>Telepresença AR</h1>
    <p>Cadastre-se para receber seu número de acesso</p>
    <input class="inp" id="iNome" type="text" placeholder="Seu nome completo" autocomplete="off"/>
    <input class="inp" id="iTel" type="tel" placeholder="Seu telefone" autocomplete="off"/>

    <!-- FOTO -->
    <div class="foto-area">
      <div class="foto-preview-wrap" id="fotoPreviewWrap" style="display:none">
        <img id="fotoPreview" class="foto-preview" style="display:block"/>
        <button class="foto-del" id="fotoDel" style="display:flex" onclick="removerFoto()">✕</button>
      </div>
      <div id="fotoBtnWrap">
        <button class="btn-foto" id="btnFoto" onclick="document.getElementById('fotoInput').click()">
          <span>📷</span><span>Adicionar foto</span>
        </button>
      </div>
      <input type="file" id="fotoInput" accept="image/*" capture="user" onchange="fotoSelecionada(event)"/>
    </div>

    <div class="upload-progress" id="uploadProgress">
      <div class="upload-bar" id="uploadBar"></div>
    </div>

    <button class="btn-cad" id="btnCad" onclick="cadastrar()">Solicitar acesso</button>
  </div>
</div>

<!-- AGUARDANDO -->
<div id="sAgu">
  <div class="agu-ring">⏳</div>
  <div class="agu-title">Aguardando aprovação</div>
  <div class="agu-sub">Seu cadastro foi enviado ao monitor.<br>Em breve você será liberado.</div>
  <button class="btn-cancel" onclick="cancelarCad()">Cancelar cadastro</button>
</div>

<!-- PRINCIPAL -->
<div id="sMain">
  <video id="vSelf" autoplay playsinline muted></video>
  <video id="vRemote" autoplay playsinline></video>
  <div class="remote-av" id="remoteAv">
    <div class="av-ini" id="remIni" style="display:flex">?</div>
    <img id="remFoto" class="av-foto" style="display:none"/>
    <div class="av-nm" id="remNm">—</div>
  </div>

  <div class="top-bar">
    <div class="top-user">
      <div class="top-av" id="topAv">?</div>
      <div>
        <div class="top-name" id="topNome">—</div>
        <div class="top-code" id="topCod">#—</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="dot-online"></div>
      <button onclick="sair()" style="background:none;border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:rgba(255,255,255,0.45);font-size:11px;padding:6px 12px;cursor:pointer;font-family:'Syne',sans-serif">Sair</button>
    </div>
  </div>

  <div class="msgs-overlay" id="msgsOverlay"></div>

  <div class="dial-box" id="dialBox">
    <div class="dial-label">Digite o código para conectar (1–100)</div>
    <div class="dial-row">
      <input class="dial-inp" id="dialInp" type="number" min="1" max="100" placeholder="Ex: 42" onkeydown="if(event.key==='Enter')discar()"/>
      <button class="btn-dial" onclick="discar()">📞 Ligar</button>
    </div>
  </div>

  <div class="call-bar" id="callBar">
    <div class="call-info-row">
      <div class="call-with"><div class="call-dot"></div><span id="callComQuem">—</span></div>
      <div class="call-timer" id="callTimer">00:00</div>
    </div>
    <div class="call-btns">
      <button class="cbtn mic" id="btnMic" onclick="toggleMic()" title="Microfone">🎤</button>
      <input class="call-msg-inp" id="msgInp" placeholder="Mensagem..." onkeydown="if(event.key==='Enter')enviarMsg()"/>
      <button class="cbtn cam" id="btnCam" onclick="toggleCam()" title="Câmera">📷</button>
      <button class="cbtn end" onclick="encerrar()" title="Encerrar">📵</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, remove, update, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ═══════════════════════════════════════════════════════════════
// COLE AQUI AS CREDENCIAIS DO SEU PROJETO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDEMO_SUBSTITUA_AQUI",
  authDomain: "seu-projeto.firebaseapp.com",
  databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com",
  projectId: "seu-projeto",
  storageBucket: "seu-projeto.appspot.com",
  messagingSenderId: "000000000000",
  appId: "1:000000000000:web:000000000000"
};
// ═══════════════════════════════════════════════════════════════

// ── CLOUDINARY ──────────────────────────────────────────────────
const CLOUD_NAME   = "dxqobkits";
const UPLOAD_PRESET = "KcVDuXkP3tib3UOPwLfcLb1x9PE";
const CLOUD_URL    = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;
// ────────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let myUid=null, myData=null;
let localStream=null;
let pc=null;
let callInterval=null, callSec=0;
let micOn=true, camOn=true;
let callTargetUid=null;
let unsubSignal=null, unsubApproval=null, unsubMonMsg=null;
let fotoFile=null, fotoUrl=null;
const ICE = {iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

const ini = n => n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const $ = id => document.getElementById(id);
function show(id){ ['sCad','sAgu','sMain'].forEach(s=>$(s).style.display='none'); $(id).style.display='flex'; }
function toast(msg,dur=3500){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function saveLocal(){ localStorage.setItem('tp_v2',JSON.stringify({uid:myUid,data:myData})); }
function clearLocal(){ localStorage.removeItem('tp_v2');myUid=null;myData=null; }

// ── FOTO ────────────────────────────────────────────────────────
window.fotoSelecionada = function(e){
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > 8*1024*1024){ toast('Foto muito grande (máx 8MB)'); return; }
  fotoFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    $('fotoPreview').src = ev.target.result;
    $('fotoPreviewWrap').style.display = 'block';
    $('fotoBtnWrap').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

window.removerFoto = function(){
  fotoFile = null; fotoUrl = null;
  $('fotoPreview').src = '';
  $('fotoPreviewWrap').style.display = 'none';
  $('fotoBtnWrap').style.display = 'block';
  $('fotoInput').value = '';
}

async function uploadFoto(file){
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', UPLOAD_PRESET);
    fd.append('folder', 'telepresenca');

    const xhr = new XMLHttpRequest();
    xhr.open('POST', CLOUD_URL);

    xhr.upload.onprogress = e => {
      if(e.lengthComputable){
        const pct = Math.round(e.loaded/e.total*100);
        $('uploadBar').style.width = pct+'%';
      }
    };
    xhr.onload = () => {
      if(xhr.status===200){
        const r = JSON.parse(xhr.responseText);
        resolve(r.secure_url);
      } else { reject(new Error('Upload falhou')); }
    };
    xhr.onerror = () => reject(new Error('Erro de rede'));
    xhr.send(fd);
  });
}

// ── INIT ────────────────────────────────────────────────────────
async function init(){
  const saved = localStorage.getItem('tp_v2');
  if(saved){
    try{
      const {uid,data} = JSON.parse(saved);
      myUid=uid; myData=data;
      const snap = await get(ref(db,'users/'+myUid));
      if(!snap.exists()){ clearLocal(); show('sCad'); return; }
      myData = snap.val(); saveLocal();
      if(myData.blocked){ toast('Seu acesso está bloqueado'); clearLocal(); show('sCad'); return; }
      if(!myData.approved){ esperarAprovacao(); return; }
      entrarMain();
    }catch(e){ clearLocal(); show('sCad'); }
  } else { show('sCad'); }
}

// ── CADASTRO ────────────────────────────────────────────────────
window.cadastrar = async function(){
  const nome = $('iNome').value.trim();
  const tel  = $('iTel').value.trim();
  if(!nome||!tel){ toast('Preencha nome e telefone'); return; }
  if(!fotoFile){ toast('Adicione uma foto para continuar'); return; }

  const btn = $('btnCad');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  $('uploadProgress').style.display = 'block';
  $('uploadBar').style.width = '0%';

  try{
    // upload da foto para o Cloudinary
    fotoUrl = await uploadFoto(fotoFile);

    const allSnap = await get(ref(db,'users'));
    let usedCodes = [];
    if(allSnap.exists()){
      const all = allSnap.val();
      const ex = Object.entries(all).find(([k,v])=>v.phone===tel);
      if(ex){
        const [uid,u]=ex; myUid=uid; myData=u; saveLocal();
        if(u.blocked){ toast('Acesso bloqueado'); clearLocal(); return; }
        if(!u.approved){ esperarAprovacao(); return; }
        entrarMain(); return;
      }
      usedCodes = Object.values(all).map(u=>u.code).filter(Boolean);
    }
    let code=null; for(let i=1;i<=100;i++){ if(!usedCodes.includes(i)){code=i;break;} }
    if(!code){ toast('Limite de 100 usuários atingido'); return; }

    const newRef = push(ref(db,'users'));
    myUid = newRef.key;
    myData = {name:nome,phone:tel,code,foto:fotoUrl,approved:false,blocked:false,online:false,createdAt:Date.now()};
    await set(newRef, myData);
    saveLocal();
    esperarAprovacao();
  }catch(err){
    toast('Erro ao enviar foto. Tente novamente.');
    console.error(err);
  }finally{
    btn.disabled = false;
    btn.textContent = 'Solicitar acesso';
    $('uploadProgress').style.display = 'none';
  }
}

function esperarAprovacao(){
  show('sAgu');
  if(unsubApproval) unsubApproval();
  unsubApproval = onValue(ref(db,'users/'+myUid), snap=>{
    if(!snap.exists()){ clearLocal(); show('sCad'); return; }
    const u=snap.val(); myData=u; saveLocal();
    if(u.blocked){ toast('Acesso bloqueado'); clearLocal(); show('sCad'); return; }
    if(u.approved){ if(unsubApproval){unsubApproval();unsubApproval=null;} entrarMain(); }
  });
}

window.cancelarCad = async function(){
  if(myUid) await remove(ref(db,'users/'+myUid));
  clearLocal(); removerFoto();
  $('iNome').value=''; $('iTel').value='';
  show('sCad');
}

// ── ENTRAR NA TELA PRINCIPAL ────────────────────────────────────
async function entrarMain(){
  await update(ref(db,'users/'+myUid),{online:true});

  // avatar: foto ou iniciais
  if(myData.foto){
    const img = document.createElement('img');
    img.src = myData.foto;
    img.style.cssText='width:100%;height:100%;object-fit:cover';
    $('topAv').innerHTML='';
    $('topAv').appendChild(img);
  } else {
    $('topAv').textContent = ini(myData.name);
  }
  $('topNome').textContent = myData.name;
  $('topCod').textContent  = 'Código: #'+myData.code;
  show('sMain');
  abrirCamera();
  ouvirSinalizacao();
  ouvirMsgMonitor();
}

window.sair = async function(){
  encerrarStream();
  await update(ref(db,'users/'+myUid),{online:false});
  clearLocal(); removerFoto();
  $('iNome').value=''; $('iTel').value='';
  show('sCad');
}

// ── CÂMERA (corpo inteiro + ambiente) ───────────────────────────
async function abrirCamera(){
  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},
      audio:true
    });
  }catch(e){
    try{
      localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    }catch(e2){ toast('Câmera indisponível'); return; }
  }
  $('vSelf').srcObject = localStream;
}

function encerrarStream(){
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  $('vSelf').srcObject=null;
}

// ── DISCAGEM ────────────────────────────────────────────────────
window.discar = async function(){
  const n = parseInt($('dialInp').value);
  if(!n||n<1||n>100){ toast('Digite um número de 1 a 100'); return; }
  if(n===myData.code){ toast('Você não pode ligar para si mesmo'); return; }
  const allSnap = await get(ref(db,'users'));
  if(!allSnap.exists()){ toast('Nenhum usuário encontrado'); return; }
  const entry = Object.entries(allSnap.val()).find(([k,v])=>v.code===n&&v.approved&&!v.blocked);
  if(!entry){ toast('Código #'+n+' não encontrado ou indisponível'); return; }
  const [tUid,tData]=entry;
  callTargetUid=tUid;

  // mostrar foto ou iniciais no preview remoto
  if(tData.foto){
    $('remIni').style.display='none';
    $('remFoto').src=tData.foto;
    $('remFoto').style.display='block';
  } else {
    $('remFoto').style.display='none';
    $('remIni').style.display='flex';
    $('remIni').textContent=ini(tData.name);
  }
  $('remNm').textContent=tData.name;
  $('callComQuem').textContent=tData.name+' #'+tData.code;
  iniciarWebRTC(tUid, tData, true);
}

// ── WebRTC ──────────────────────────────────────────────────────
async function iniciarWebRTC(tUid, tData, isCaller){
  if(pc){ pc.close(); pc=null; }
  pc = new RTCPeerConnection(ICE);
  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack = e=>{
    const rs=e.streams[0];
    $('vRemote').srcObject=rs;
    $('vRemote').style.display='block';
    $('remoteAv').style.display='none';
  };
  pc.onicecandidate = e=>{
    if(e.candidate) push(ref(db,'signal/'+tUid+'/ice'),{from:myUid,cand:JSON.stringify(e.candidate)});
  };
  pc.onconnectionstatechange=()=>{
    if(pc&&(pc.connectionState==='disconnected'||pc.connectionState==='failed')) encerrar();
  };
  await remove(ref(db,'signal/'+myUid+'/ice'));

  if(isCaller){
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await set(ref(db,'signal/'+tUid+'/offer'),{from:myUid,sdp:JSON.stringify(offer),callerName:myData.name,callerCode:myData.code,callerFoto:myData.foto||''});
    onValue(ref(db,'signal/'+myUid+'/answer'), async snap=>{
      if(!snap.exists()) return;
      const {sdp}=snap.val();
      if(pc.signalingState==='have-local-offer') await pc.setRemoteDescription(JSON.parse(sdp));
    },{onlyOnce:false});
  } else {
    const offerSnap = await get(ref(db,'signal/'+myUid+'/offer'));
    const {sdp}=offerSnap.val();
    await pc.setRemoteDescription(JSON.parse(sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await set(ref(db,'signal/'+tUid+'/answer'),{from:myUid,sdp:JSON.stringify(answer)});
  }
  onValue(ref(db,'signal/'+myUid+'/ice'), snap=>{
    if(!snap.exists()) return;
    Object.values(snap.val()).forEach(item=>{
      if(item.from===tUid&&item.cand) pc.addIceCandidate(new RTCIceCandidate(JSON.parse(item.cand))).catch(()=>{});
    });
  });
  mostrarBarraChamada(tData);
  $('dialBox').style.display='none';
  $('remoteAv').style.display='flex';
}

function mostrarBarraChamada(tData){
  callSec=0; clearInterval(callInterval);
  callInterval=setInterval(()=>{
    callSec++;
    $('callTimer').textContent=String(Math.floor(callSec/60)).padStart(2,'0')+':'+String(callSec%60).padStart(2,'0');
  },1000);
  $('callBar').style.display='flex';
}

function ouvirSinalizacao(){
  if(unsubSignal) unsubSignal();
  unsubSignal = onValue(ref(db,'signal/'+myUid+'/offer'), async snap=>{
    if(!snap.exists()) return;
    const {from,callerName,callerCode,callerFoto}=snap.val();
    if(from===callTargetUid) return;
    callTargetUid=from;
    if(callerFoto){
      $('remIni').style.display='none';
      $('remFoto').src=callerFoto;
      $('remFoto').style.display='block';
    } else {
      $('remFoto').style.display='none';
      $('remIni').style.display='flex';
      $('remIni').textContent=ini(callerName||'?');
    }
    $('remNm').textContent=callerName||'?';
    $('callComQuem').textContent=(callerName||'?')+' #'+(callerCode||'?');
    toast('📲 Chamada de '+callerName+' #'+callerCode);
    await iniciarWebRTC(from,{name:callerName,code:callerCode,foto:callerFoto},false);
  });
}

function ouvirMsgMonitor(){
  if(unsubMonMsg) unsubMonMsg();
  unsubMonMsg = onValue(ref(db,'monitor_msg/'+myUid), snap=>{
    if(!snap.exists()) return;
    const m=snap.val();
    if(m&&m.text) toast('📩 Monitor: '+m.text, 5000);
  });
}

window.toggleMic=function(){
  micOn=!micOn;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=micOn);
  $('btnMic').classList.toggle('off',!micOn);
}
window.toggleCam=function(){
  camOn=!camOn;
  if(localStream) localStream.getVideoTracks().forEach(t=>t.enabled=camOn);
  $('btnCam').classList.toggle('off',!camOn);
}

window.encerrar=async function(){
  clearInterval(callInterval);
  if(pc){ pc.close(); pc=null; }
  $('vRemote').style.display='none';
  $('vRemote').srcObject=null;
  $('remoteAv').style.display='none';
  if(callTargetUid){
    await remove(ref(db,'signal/'+callTargetUid+'/offer'));
    await remove(ref(db,'signal/'+callTargetUid+'/answer'));
  }
  await remove(ref(db,'signal/'+myUid+'/offer'));
  await remove(ref(db,'signal/'+myUid+'/answer'));
  callTargetUid=null;
  $('callBar').style.display='none';
  $('dialBox').style.display='block';
  $('dialInp').value='';
  $('msgsOverlay').innerHTML='';
}

window.enviarMsg=async function(){
  const inp=$('msgInp'), txt=inp.value.trim();
  if(!txt||!callTargetUid) return;
  const chatKey=[myUid,callTargetUid].sort().join('_');
  await push(ref(db,'chats/'+chatKey),{fromUid:myUid,name:myData.name,text:txt,ts:Date.now()});
  inp.value='';
  adicionarMsg(txt,'me','');
}

function adicionarMsg(txt,tipo,who){
  const ov=$('msgsOverlay');
  const d=document.createElement('div');
  d.className='fmsg '+tipo;
  if(who) d.innerHTML='<div class="who">'+who+'</div>'+txt;
  else d.textContent=txt;
  ov.appendChild(d);
  if(ov.children.length>8) ov.removeChild(ov.firstChild);
}

let unsubMsgChat=null;
setInterval(()=>{
  if(!callTargetUid||!myUid) return;
  if(unsubMsgChat) return;
  const chatKey=[myUid,callTargetUid].sort().join('_');
  let first=true;
  unsubMsgChat = onValue(ref(db,'chats/'+chatKey), snap=>{
    if(first){first=false;return;}
    if(!snap.exists()) return;
    const vals=Object.values(snap.val());
    const last=vals[vals.length-1];
    if(last&&last.fromUid!==myUid) adicionarMsg(last.text,'them',last.name);
  });
},500);

window.addEventListener('beforeunload',()=>{
  if(myUid) update(ref(db,'users/'+myUid),{online:false});
});

init();
</script>
